services:
  - type: web
    name: lecture-scraper
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python start_render.py"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
    healthCheckPath: /